<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Products Knowledge Assessment</title>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Poppins:wght@400;600;700&family=Hind+Siliguri:wght@400;600;700&display=swap');

        :root {
            --primary: #6c5ce7;
            --success: #00b894;
            --danger: #d63031;
            --bg: #f0f3f7;
            --shadow: 9px 9px 16px rgb(163,177,198,0.6), -9px -9px 16px rgba(255,255,255, 0.5);
            --inner-shadow: inset 6px 6px 12px #c1c9d7, inset -6px -6px 12px #ffffff;
        }

        * { box-sizing: border-box; margin: 0; padding: 0; transition: all 0.3s ease; }
        body { font-family: 'Poppins', 'Hind Siliguri', sans-serif; background: var(--bg); display: flex; justify-content: center; align-items: center; min-height: 100vh; padding: 15px; }
        
        .container { background: var(--bg); width: 100%; max-width: 500px; border-radius: 30px; box-shadow: var(--shadow); padding: 35px; text-align: center; position: relative; }
        
        #custom-alert { position: fixed; top: 20px; left: 50%; transform: translateX(-50%) translateY(-100px); background: #ff7675; color: white; padding: 12px 25px; border-radius: 50px; z-index: 2000; transition: 0.5s; opacity: 0; font-weight: 600; box-shadow: 0 5px 15px rgba(0,0,0,0.2); }
        #custom-alert.show { transform: translateX(-50%) translateY(0); opacity: 1; }

        .header h2 { color: var(--primary); font-size: 1.3rem; margin-bottom: 25px; text-transform: uppercase; letter-spacing: 1px; }
        
        .lang-btn { padding: 8px 18px; border-radius: 12px; border: none; cursor: pointer; background: var(--bg); box-shadow: var(--shadow); font-weight: 700; color: #636e72; font-size: 0.85rem; }
        .lang-btn.active { box-shadow: var(--inner-shadow); color: var(--primary); }
        
        .neumorph-input { width: 100%; padding: 15px; border: none; background: var(--bg); border-radius: 15px; box-shadow: var(--inner-shadow); outline: none; margin-top: 10px; font-family: inherit; font-size: 0.95rem; }
        
        .btn { padding: 15px; border: none; border-radius: 18px; cursor: pointer; font-weight: 700; background: var(--bg); box-shadow: var(--shadow); color: var(--primary); width: 100%; margin-top: 15px; font-size: 1rem; text-decoration: none; display: block; }
        .btn:active { box-shadow: var(--inner-shadow); transform: scale(0.98); }
        .btn-start { background: var(--primary); color: white; }

        .hidden { display: none; }
        .option { padding: 15px; margin-bottom: 15px; border-radius: 15px; cursor: pointer; background: var(--bg); box-shadow: var(--shadow); text-align: left; font-size: 0.95rem; font-weight: 500; color: #2d3436; border: 2px solid transparent; }
        .option.selected { box-shadow: var(--inner-shadow); color: var(--primary); font-weight: 700; border-left: 6px solid var(--primary); }

        .score-circle { width: 140px; height: 140px; margin: 25px auto; position: relative; }
        .score-text { position: absolute; top: 50%; left: 50%; transform: translate(-50%, -50%); font-size: 1.8rem; font-weight: 800; color: var(--primary); }
        svg { transform: rotate(-90deg); width: 100%; height: 100%; }
        circle { fill: none; stroke-width: 10; stroke: #dfe6e9; stroke-dasharray: 283; }
        .progress-bar { stroke: var(--primary); stroke-dashoffset: 283; transition: 1.8s cubic-bezier(0.4, 0, 0.2, 1); stroke-linecap: round; }

        .review-container { text-align: left; margin-top: 30px; max-height: 280px; overflow-y: auto; padding: 10px; border-top: 2px solid #e0e0e0; }
        .review-item { padding: 15px; margin-bottom: 15px; border-radius: 15px; box-shadow: var(--inner-shadow); font-size: 0.85rem; line-height: 1.5; }

        #selection-notice { position: fixed; top: 50%; left: 50%; transform: translate(-50%, -50%) scale(0.7); background: white; padding: 35px; border-radius: 25px; box-shadow: 0 15px 40px rgba(0,0,0,0.2); z-index: 1000; text-align: center; visibility: hidden; opacity: 0; transition: 0.5s; width: 90%; max-width: 420px; }
        #selection-notice.show { visibility: visible; opacity: 1; transform: translate(-50%, -50%) scale(1); }
        
        textarea { resize: none; }
    </style>
</head>
<body>

<div id="custom-alert">⚠️ Please complete this!</div>

<div id="selection-notice">
    <div style="font-size: 60px; margin-bottom: 10px;">🌿</div>
    <h2 style="color: var(--success); font-weight: 700;">Excellent Performance!</h2>
    <p id="sel-text" style="font-weight: 600; margin: 10px 0; color: #2d3436;"></p>
    <p style="font-size: 0.9rem; color: #636e72;">You are successfully selected for:</p>
    <div style="font-weight: 700; color: var(--primary); font-size: 1.1rem; background: #f0f3f7; padding: 12px; border-radius: 15px; margin: 15px 0; box-shadow: var(--inner-shadow);">
        [ How to Start Your Business ] 🚀
    </div>
    <button class="btn" onclick="closeNotice()" style="background: var(--success); color: white; box-shadow: none;">Proceed to Next Step</button>
</div>

<div class="container">
    <div class="header">
        <h2>Products Assessment</h2>
        <div style="display: flex; justify-content: center; gap: 12px;">
            <button class="lang-btn active" id="btn-en" onclick="setLang('en')">English</button>
            <button class="lang-btn" id="btn-bn" onclick="setLang('bn')">বাংলা</button>
        </div>
    </div>

    <div id="welcome">
        <div style="margin-top: 10px;">
            <h3 style="color: var(--primary); font-size: 1.2rem;">Juwel Rana Sir</h3>
            <p style="font-size: 0.8rem; color: #7f8c8d; font-weight: 600; margin-bottom: 25px;">Corporate Trainer & Co-Founder</p>
        </div>
        <div style="text-align: left; margin-bottom: 15px;">
            <label style="font-size: 0.75rem; font-weight: 700; color: #a4b0be; margin-left: 10px;">YOUR FULL NAME</label>
            <input type="text" id="userName" class="neumorph-input" placeholder="Enter your name...">
        </div>
        <div style="text-align: left; margin-bottom: 25px;">
            <label style="font-size: 0.75rem; font-weight: 700; color: #a4b0be; margin-left: 10px;">MENTOR NAME</label>
            <input type="text" id="mentorName" class="neumorph-input" placeholder="Enter mentor's name...">
        </div>
        <button class="btn btn-start" onclick="startQuiz()">START ASSESSMENT</button>
    </div>

    <div id="quiz" class="hidden">
        <p id="progress" style="font-weight: 700; color: var(--primary); font-size: 0.9rem; margin-bottom: 15px;"></p>
        <h3 id="question" style="margin-bottom: 25px; font-size: 1.05rem; line-height: 1.4; color: #2d3436;"></h3>
        <div id="options"></div>
        <div id="text-input-area" class="hidden">
            <textarea id="writtenAns" class="neumorph-input" rows="6" placeholder="Describe in at least 3 lines for 10% marks..."></textarea>
        </div>
        <div style="display: flex; gap: 15px; margin-top: 25px;">
            <button class="btn" id="prevBtn" onclick="prev()" style="width: 25%;"><i class="fa-solid fa-arrow-left"></i></button>
            <button class="btn" id="nextBtn" onclick="next()" style="flex:1">NEXT</button>
        </div>
    </div>

    <div id="result" class="hidden">
        <h2 style="font-size: 1.3rem; color: var(--primary);">Assessment Result</h2>
        <div class="score-circle">
            <svg viewBox="0 0 100 100"><circle cx="50" cy="50" r="45"></circle><circle id="ring" class="progress-bar" cx="50" cy="50" r="45"></circle></svg>
            <div class="score-text" id="pctText">0%</div>
        </div>
        <p style="font-weight: 600; color: #636e72; font-size: 0.9rem;">Your Score Percentage</p>
        <div id="review-list" class="review-container"></div>
        <a href="https://m.me/juwelrana.official" class="btn btn-start" style="margin-top: 20px;">BACK TO MENTOR</a>
    </div>
</div>

<script>
    const SCRIPT_URL = "https://script.google.com/macros/s/AKfycbz-QE6Hzk0_qOhrvCpoEA-9NkL5X9ysqKULfkgg5nYqlUFHMZMl9VW92OypWpwtQcDU6Q/exec";
    let currentLang = 'en', currentIdx = 0, userAnswers = [];

    const quizData = [
        { q_en: "1. Forever Aloe vera Gel...", q_bn: "১. ফরএভার অ্যালোভেরা জেল...", a_en: ["Detoxifies Toxins", "Provide 270 Nutritions", "Enhances Immunity", "All of them"], a_bn: ["বিষমুক্ত করে", "২৭০টি পুষ্টি দেয়", "ইমিউনিটি বাড়ায়", "সবগুলোই"], ans: 3 },
        { q_en: "2. Best variety among 400 Aloe?", q_bn: "২. ৪০০ জাতের মধ্যে সেরা কোনটি?", a_en: ["Aloe Ferox", "Aloe Barbadensis Miller", "Aloe Aculeata"], a_bn: ["ফেরক্স", "বারবাডেনসিস মিলার", "একুলিয়াটা"], ans: 1 },
        { q_en: "3. Forever Products are related to", q_bn: "৩. প্রোডাক্টগুলো কিসের সাথে সম্পর্কিত?", a_en: ["Toy products", "Health & Beauty", "Grocery Products"], a_bn: ["খেলনা", "স্বাস্থ্য ও সৌন্দর্য", "মুদি পণ্য"], ans: 1 },
        { q_en: "4. Forever Products are", q_bn: "৪. ফরএভার প্রোডাক্টগুলো কেমন?", a_en: ["Patent Stabilised", "333 Quality tested", "World class Quality", "All of the above"], a_bn: ["প্যাটেন্ট করা", "৩৩৩ বার টেস্ট করা", "বিশ্বমানের পণ্য", "সবগুলোই"], ans: 3 },
        { q_en: "5. Why should you use Forever Products?", q_bn: "৫. কেন ফরএভারের পণ্য ব্যবহার করবেন?", a_en: ["Quality Conviction", "Asset Building", "Look & Feel Better", "All of the above"], a_bn: ["মানের নিশ্চয়তা", "সম্পদ গঠন", "ভালো লুক ও ফিল", "সবগুলোই"], ans: 3 },
        { q_en: "6. Market Value of the products?", q_bn: "৬. প্রোডাক্টগুলোর মার্কেট ভ্যালু কেমন?", a_en: ["Very Huge", "Sufficient", "Don't think so"], a_bn: ["বিশাল", "পর্যাপ্ত", "মনে হয় না"], ans: 0 },
        { q_en: "7. What 3 products you loved the most?", q_bn: "৭. কোন ৩টি প্রোডাক্ট আপনার সবচেয়ে পছন্দ হয়েছে?", type: "written" },
        { q_en: "8. Why're you planning to consume these?", q_bn: "৮. কেন আপনি এই পণ্যগুলো ব্যবহার করতে চান?", type: "written" },
        { q_en: "9. FLP Achievements:", q_bn: "৯. FLP-এর অর্জন কোনটি?", a_en: ["Korea's Beloved Brand", "Nobel Prize winning product", "1.4m Quality Tests", "All of the above"], a_bn: ["কোরিয়ার সেরা ব্র্যান্ড", "নোবেল জয়ী পণ্য", "১৪ লক্ষ টেস্ট", "সবগুলোই"], ans: 3 },
        { q_en: "10. Most fascinating topic of Products?", q_bn: "১০. প্রোডাক্টের সবচেয়ে আকর্ষণীয় বিষয় কোনটি?", type: "written" }
    ];

    userAnswers = new Array(quizData.length).fill(null);

    function setLang(l) {
        currentLang = l;
        document.getElementById('btn-en').classList.toggle('active', l==='en');
        document.getElementById('btn-bn').classList.toggle('active', l==='bn');
        if(!document.getElementById('quiz').classList.contains('hidden')) renderQuestion();
    }

    function showAlert(m) {
        const a = document.getElementById('custom-alert');
        a.innerText = m; a.classList.add('show');
        setTimeout(() => a.classList.remove('show'), 3000);
    }

    function startQuiz() {
        if(!document.getElementById('userName').value.trim() || !document.getElementById('mentorName').value.trim()) return showAlert("Please fill up all fields!");
        document.getElementById('welcome').classList.add('hidden');
        document.getElementById('quiz').classList.remove('hidden');
        renderQuestion();
    }

    function renderQuestion() {
        const q = quizData[currentIdx];
        document.getElementById('progress').innerText = (currentLang==='en'?"QUESTION: ":"প্রশ্ন: ") + `${currentIdx + 1} / 10`;
        document.getElementById('question').innerText = currentLang === 'en' ? q.q_en : q.q_bn;
        const optBox = document.getElementById('options'), txtArea = document.getElementById('text-input-area');
        optBox.innerHTML = ""; txtArea.classList.add('hidden');

        if(q.type === "written") {
            txtArea.classList.remove('hidden');
            document.getElementById('writtenAns').value = userAnswers[currentIdx] || "";
        } else {
            (currentLang === 'en' ? q.a_en : q.a_bn).forEach((text, i) => {
                const d = document.createElement('div');
                d.className = `option ${userAnswers[currentIdx] === i ? 'selected' : ''}`;
                d.innerText = text; d.onclick = () => { userAnswers[currentIdx] = i; renderQuestion(); };
                optBox.appendChild(d);
            });
        }
        document.getElementById('prevBtn').style.visibility = currentIdx === 0 ? 'hidden' : 'visible';
    }

    function next() {
        const q = quizData[currentIdx];
        if(q.type === "written") {
            const val = document.getElementById('writtenAns').value.trim();
            // Minimum requirement to proceed
            if(val.length < 15) return showAlert(currentLang==='en'?"Please write in detail!":"দয়া করে বিস্তারিত লিখুন!");
            userAnswers[currentIdx] = val;
        } else if(userAnswers[currentIdx] === null) return showAlert("Select an answer!");
        
        if(currentIdx < 9) { currentIdx++; renderQuestion(); } else showResult();
    }

    function prev() { if(currentIdx > 0) { currentIdx--; renderQuestion(); } }

    function showResult() {
        document.getElementById('quiz').classList.add('hidden');
        document.getElementById('result').classList.remove('hidden');
        let totalScore = 0;
        const rev = document.getElementById('review-list'); rev.innerHTML = "";

        userAnswers.forEach((ans, i) => {
            const q = quizData[i];
            let earned = 0, statusHtml = "";
            
            if(q.type === "written") {
                // Modified logic: 3 sentences or marks of line breaks = 10 marks
                const lineArr = ans.split(/[.।\n]/).filter(l => l.trim().length > 10);
                const count = lineArr.length;
                
                if(count >= 3) earned = 10;
                else if(count === 2) earned = 6;
                else earned = 3;

                statusHtml = `<p style="color:var(--primary); font-weight:600; margin-top:5px;">Your Note: <span style="font-weight:400; color:#555;">${ans.substring(0,60)}...</span> <br> [Score: ${earned}/10]</p>`;
            } else {
                const isCorrect = ans === q.ans;
                earned = isCorrect ? 10 : 0;
                statusHtml = `<p style="margin-top:5px;">Your Choice: <span style="color:${isCorrect?'var(--success)':'var(--danger)'}; font-weight:700;">${currentLang=='en'?q.a_en[ans]:q.a_bn[ans]}</span><br>
                Correct: <span style="color:var(--success); font-weight:700;">${currentLang=='en'?q.a_en[q.ans]:q.a_bn[q.ans]}</span></p>`;
            }
            totalScore += earned;
            rev.innerHTML += `<div class="review-item"><b>${i+1}. ${currentLang=='en'?q.q_en:q.q_bn}</b>${statusHtml}</div>`;
        });

        document.getElementById('pctText').innerText = totalScore + "%";
        document.getElementById('ring').style.strokeDashoffset = 283 - (283 * totalScore / 100);

        fetch(SCRIPT_URL, { method: 'POST', mode: 'no-cors', body: JSON.stringify({ 
            name: document.getElementById('userName').value, 
            mentor: document.getElementById('mentorName').value, 
            score: totalScore + "%", 
            answers: userAnswers 
        }) });
        
        if(totalScore >= 50) {
            document.getElementById('sel-text').innerText = "Dear " + document.getElementById('userName').value + ",";
            setTimeout(() => document.getElementById('selection-notice').classList.add('show'), 1000);
        }
    }

    function closeNotice() { document.getElementById('selection-notice').classList.remove('show'); }
</script>
</body>
</html>
